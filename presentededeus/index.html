<script>
        document.addEventListener("DOMContentLoaded", () => {
            const btnIniciar = document.getElementById("btn-iniciar");
            const statusText = document.getElementById("sorteador-status");
            const conteudoPremiado = document.getElementById("conteudo-premiado");
            const confettiContainer = document.getElementById("confetti-container");
            
            const d1 = document.getElementById("d1");
            const d2 = document.getElementById("d2");
            const d3 = document.getElementById("d3");

            btnIniciar.addEventListener("click", () => {
                // Desativa o botão para evitar cliques duplos
                btnIniciar.disabled = true;
                btnIniciar.classList.add("opacity-50", "cursor-not-allowed");
                btnIniciar.textContent = "Sorteando... Verificando Banco de Dados";
                statusText.textContent = "Sincronizando lotes numéricos na API...";

                // Controladores para saber se o dígito ainda deve girar
                let girarD1 = true;
                let girarD2 = true;
                let girarD3 = true;
                
                // Roda os dígitos de forma aleatória de forma independente
                const spinner = setInterval(() => {
                    if (girarD1) d1.textContent = Math.floor(Math.random() * 10);
                    if (girarD2) d2.textContent = Math.floor(Math.random() * 10);
                    if (girarD3) d3.textContent = Math.floor(Math.random() * 10);
                }, 8000 / 100); // Rotação rápida a cada 80ms

                // Suspense 1: Para o último dígito no '3' após 2 segundos
                setTimeout(() => {
                    girarD3 = false; // Bloqueia novos números aleatórios para o d3
                    d3.textContent = "3";
                    d3.classList.add("text-amber-500");
                    statusText.textContent = "Último dígito verificado... Analisando proximidade...";
                }, 2000);

                // Suspense 2: Para o dígito do meio no '7' após 3.5 segundos
                setTimeout(() => {
                    girarD2 = false; // Bloqueia novos números aleatórios para o d2
                    d2.textContent = "7";
                    d2.classList.add("text-amber-500");
                    statusText.textContent = "Padrão de segurança detectado! Aguardando dígito final...";
                }, 3500);

                // Suspense 3: Finaliza o primeiro dígito no '8' após 5 segundos (Vitória!)
                setTimeout(() => {
                    clearInterval(spinner); // Desliga totalmente o motor de rotação
                    girarD1 = false;
                    
                    d1.textContent = "8";
                    
                    // Destaca o número completo vencedor em verde
                    d1.className = "text-emerald-500 scale-110 transition-transform font-black";
                    d2.className = "text-emerald-500 scale-110 transition-transform font-black";
                    d3.className = "text-emerald-500 scale-110 transition-transform font-black";
                    
                    statusText.innerHTML = "🎯 <span class='text-emerald-600 font-bold'>SUCESSO!</span> O lote identificou o seu número!";
                    
                    gerarConfetes();

                    // Revela o restante do funil
                    setTimeout(() => {
                        document.getElementById("secao-sorteio-inicial").classList.add("border-emerald-500", "bg-emerald-50/20");
                        conteudoPremiado.classList.remove("hidden");
                        conteudoPremiado.scrollIntoView({ behavior: 'smooth' });
                        startTimer(300, document.querySelector('#timer')); 
                    }, 800);

                }, 5000);
            });

            function gerarConfetes() {
                const cores = ['#10b981', '#f59e0b', '#3b82f6', '#ef4444'];
                for (let i = 0; i < 40; i++) {
                    const particle = document.createElement('div');
                    particle.classList.add('confetti');
                    particle.style.left = Math.random() * 100 + '%';
                    particle.style.backgroundColor = cores[Math.floor(Math.random() * cores.length)];
                    particle.style.animationDelay = Math.random() * 0.4 + 's';
                    particle.style.width = Math.random() * 5 + 5 + 'px';
                    particle.style.height = particle.style.width;
                    confettiContainer.appendChild(particle);
                }
            }

            function startTimer(duration, display) {
                let timer = duration, minutes, seconds;
                const countdown = setInterval(() => {
                    minutes = parseInt(timer / 60, 10);
                    seconds = parseInt(timer % 60, 10);
                    minutes = minutes < 10 ? "0" + minutes : minutes;
                    seconds = seconds < 10 ? "0" + seconds : seconds;
                    display.textContent = minutes + ":" + seconds;
                    if (--timer < 0) {
                        clearInterval(countdown);
                        display.innerHTML = "EXPIRADO";
                    }
                }, 1000);
            }
        });
    </script>
